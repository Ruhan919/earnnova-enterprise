version: '3.9'

services:
  app:
    build: .
    container_name: earnnova-app
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - earnnova
    volumes:
      - storage_data:/var/www/storage

  web:
    image: nginx:alpine
    container_name: earnnova-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - earnnova

  postgres:
    image: postgres:16-alpine
    container_name: earnnova-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: earnnova
      POSTGRES_USER: earnnova
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U earnnova"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - earnnova

  redis:
    image: redis:7-alpine
    container_name: earnnova-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-secret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - earnnova

  horizon:
    build: .
    container_name: earnnova-horizon
    restart: unless-stopped
    command: php artisan horizon
    environment:
      APP_ENV: production
    env_file: .env
    depends_on:
      - postgres
      - redis
    networks:
      - earnnova

  scheduler:
    build: .
    container_name: earnnova-scheduler
    restart: unless-stopped
    command: php artisan schedule:work
    environment:
      APP_ENV: production
    env_file: .env
    depends_on:
      - postgres
    networks:
      - earnnova

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: earnnova-search
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-secretkey}
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - earnnova

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  storage_data:

networks:
  earnnova:
    driver: bridge
