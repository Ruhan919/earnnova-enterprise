services:
  - type: web
    name: earnnova-enterprise
    runtime: php
    region: singapore
    plan: free
    buildCommand: composer install --no-interaction --prefer-dist --optimize-autoloader
    startCommand: php artisan serve --host=0.0.0.0 --port=8080
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://earnnova-enterprise.onrender.com
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: sqlite
      - key: SESSION_DRIVER
        value: file
